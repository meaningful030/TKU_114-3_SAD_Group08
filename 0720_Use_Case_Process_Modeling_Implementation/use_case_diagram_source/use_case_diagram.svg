<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">同人誌販售會攤位管理系統「攤集」使用案例圖</title>
  <desc id="diagram-desc">攤主可提交攤位申請、查詢申請狀態及補正退回申請；主辦方承辦人可審核攤位申請及配置攤位位置；一般參加者可查詢攤位位置。圖中共有三種參與者與六個使用案例。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 600 28px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; }
      .actor-label { font: 600 21px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .actor-role { font: 400 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; text-anchor: middle; }
      .uc-id { font: 600 17px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; text-anchor: middle; }
      .uc-name { font: 600 23px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .uc-trace { font: 400 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; text-anchor: middle; }
      .edge-label { font: 600 16px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #334155; text-anchor: middle; }
      .legend { font: 400 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #334155; }
      .assoc { fill: none; stroke: #475569; stroke-width: 2.2; marker-end: url(#arrow); }
      .boundary { fill: #ffffff; stroke: #334155; stroke-width: 2.5; }
      .boundary-head { fill: #f1f5f9; stroke: none; }
      .uc-current { fill: #f8fafc; stroke: #64748b; stroke-width: 2.5; }
      .uc-highest { fill: #eff6ff; stroke: #2563eb; stroke-width: 3.5; }
      .uc-later { fill: #fffbeb; stroke: #d97706; stroke-width: 2.8; stroke-dasharray: 9 6; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#ffffff"/>

  <!-- System boundary -->
  <rect class="boundary" x="330" y="55" width="940" height="880" rx="4"/>
  <rect class="boundary-head" x="331" y="56" width="938" height="74"/>
  <line x1="330" y1="130" x2="1270" y2="130" stroke="#cbd5e1" stroke-width="2"/>
  <text class="title" x="800" y="88" text-anchor="middle">同人誌販售會攤位管理系統「攤集」</text>
  <text class="subtitle" x="800" y="114" text-anchor="middle">系統邊界｜需求包 0.8-draft／2026-07-15</text>

  <!-- Associations: participant to use case; no process sequencing -->
  <path class="assoc" d="M190 340 L380 223"/>
  <path class="assoc" d="M190 355 L380 375"/>
  <path class="assoc" d="M190 370 L380 535"/>
  <path class="assoc" d="M1410 390 L1220 285"/>
  <path class="assoc" d="M1410 415 L1220 505"/>
  <path class="assoc" d="M1410 754 L1220 750"/>

  <!-- Association labels -->
  <g>
    <rect x="255" y="263" width="58" height="28" rx="14" fill="#ffffff"/>
    <text class="edge-label" x="284" y="283">提交</text>
    <rect x="255" y="345" width="58" height="28" rx="14" fill="#ffffff"/>
    <text class="edge-label" x="284" y="365">查詢</text>
    <rect x="255" y="463" width="58" height="28" rx="14" fill="#ffffff"/>
    <text class="edge-label" x="284" y="483">補正</text>
    <rect x="1303" y="323" width="58" height="28" rx="14" fill="#ffffff"/>
    <text class="edge-label" x="1332" y="343">審核</text>
    <rect x="1303" y="468" width="58" height="28" rx="14" fill="#ffffff"/>
    <text class="edge-label" x="1332" y="488">配置</text>
    <rect x="1303" y="733" width="58" height="28" rx="14" fill="#ffffff"/>
    <text class="edge-label" x="1332" y="753">查詢</text>
  </g>

  <!-- Use cases -->
  <g aria-label="UC-01 提交攤位申請">
    <ellipse class="uc-current" cx="600" cy="220" rx="220" ry="62"/>
    <text x="600" y="196"><tspan class="uc-id" x="600">UC-01</tspan><tspan class="uc-name" x="600" dy="28">提交攤位申請</tspan><tspan class="uc-trace" x="600" dy="25">US-01～03｜FR-01～04｜Must・既有基線</tspan></text>
  </g>
  <g aria-label="UC-02 查詢申請狀態">
    <ellipse class="uc-current" cx="600" cy="375" rx="220" ry="62"/>
    <text x="600" y="351"><tspan class="uc-id" x="600">UC-02</tspan><tspan class="uc-name" x="600" dy="28">查詢申請狀態</tspan><tspan class="uc-trace" x="600" dy="25">US-03～04｜FR-03、FR-08｜Must</tspan></text>
  </g>
  <g aria-label="UC-04 補正退回申請">
    <ellipse class="uc-current" cx="600" cy="535" rx="220" ry="62"/>
    <text x="600" y="511"><tspan class="uc-id" x="600">UC-04</tspan><tspan class="uc-name" x="600" dy="28">補正退回申請</tspan><tspan class="uc-trace" x="600" dy="25">US-04｜FR-08｜Must・第二切片</tspan></text>
  </g>
  <g aria-label="UC-03 審核攤位申請，最高優先">
    <ellipse class="uc-highest" cx="1000" cy="285" rx="220" ry="62"/>
    <text x="1000" y="261"><tspan class="uc-id" x="1000">UC-03</tspan><tspan class="uc-name" x="1000" dy="28">審核攤位申請</tspan><tspan class="uc-trace" x="1000" dy="25">US-05～06｜FR-04～05｜最高優先</tspan></text>
  </g>
  <g aria-label="UC-05 配置攤位位置，後續切片">
    <ellipse class="uc-later" cx="1000" cy="505" rx="220" ry="62"/>
    <text x="1000" y="481"><tspan class="uc-id" x="1000">UC-05</tspan><tspan class="uc-name" x="1000" dy="28">配置攤位位置</tspan><tspan class="uc-trace" x="1000" dy="25">US-07｜FR-06｜Should・後續切片</tspan></text>
  </g>
  <g aria-label="UC-06 查詢攤位位置，最高優先及下一切片">
    <ellipse class="uc-highest" cx="1000" cy="750" rx="220" ry="62" stroke-dasharray="9 6"/>
    <text x="1000" y="726"><tspan class="uc-id" x="1000">UC-06</tspan><tspan class="uc-name" x="1000" dy="28">查詢攤位位置</tspan><tspan class="uc-trace" x="1000" dy="25">US-08｜FR-07｜最高優先・下一切片</tspan></text>
  </g>

  <!-- Actors -->
  <g aria-label="主要參與者 攤主" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="145" cy="285" r="22" fill="#ffffff"/>
    <line x1="145" y1="307" x2="145" y2="365"/>
    <line x1="105" y1="327" x2="185" y2="327"/>
    <line x1="145" y1="365" x2="112" y2="407"/>
    <line x1="145" y1="365" x2="178" y2="407"/>
  </g>
  <text class="actor-role" x="145" y="440">主要參與者</text>
  <text class="actor-label" x="145" y="469">攤主</text>

  <g aria-label="主要參與者 主辦方承辦人" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="1450" cy="315" r="22" fill="#ffffff"/>
    <line x1="1450" y1="337" x2="1450" y2="395"/>
    <line x1="1410" y1="357" x2="1490" y2="357"/>
    <line x1="1450" y1="395" x2="1417" y2="437"/>
    <line x1="1450" y1="395" x2="1483" y2="437"/>
  </g>
  <text class="actor-role" x="1450" y="470">主要參與者</text>
  <text class="actor-label" x="1450" y="499">主辦方承辦人</text>

  <g aria-label="主要參與者 一般參加者" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="1450" cy="675" r="22" fill="#ffffff"/>
    <line x1="1450" y1="697" x2="1450" y2="755"/>
    <line x1="1410" y1="717" x2="1490" y2="717"/>
    <line x1="1450" y1="755" x2="1417" y2="797"/>
    <line x1="1450" y1="755" x2="1483" y2="797"/>
  </g>
  <text class="actor-role" x="1450" y="830">主要參與者</text>
  <text class="actor-label" x="1450" y="859">一般參加者</text>

  <!-- Legend -->
  <g transform="translate(410 865)">
    <line x1="0" y1="0" x2="42" y2="0" stroke="#2563eb" stroke-width="4"/>
    <text class="legend" x="52" y="6">最高優先</text>
    <line x1="180" y1="0" x2="222" y2="0" stroke="#64748b" stroke-width="3"/>
    <text class="legend" x="232" y="6">既有／目前切片</text>
    <line x1="410" y1="0" x2="452" y2="0" stroke="#d97706" stroke-width="3" stroke-dasharray="9 6"/>
    <text class="legend" x="462" y="6">後續或下一切片</text>
  </g>
  <text class="subtitle" x="800" y="905" text-anchor="middle">箭頭表示「參與者透過系統執行目標」；本圖不表示流程先後。</text>
</svg>

