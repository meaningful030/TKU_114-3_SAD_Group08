<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="3000" viewBox="0 0 2100 3000" role="img" aria-labelledby="target-title target-desc">
  <title id="target-title">同人誌販售會申請、人工審核排位與公開靜態查攤目標泳道圖</title>
  <desc id="target-desc">五條直式泳道為攤主、系統、主辦方承辦人、一般參加者與現場工作人員。流程從準備申請開始，保留人工審核與人工選位，加入欄位驗證、待審同步、重複格位拒絕及完整值靜態查攤，最後到找到攤位或仍無法及時確認。圖中標示五項改善、替代與例外路徑，以及待確認限制。</desc>
  <defs>
    <marker id="arrow-t6" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
    <marker id="handoff-arrow-t6" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker>
    <style>
      .title { font: 600 31px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; }
      .lane-title { font: 600 22px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .node-text { font: 500 17px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 400 14px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; text-anchor: middle; }
      .edge-label { font: 600 14px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #334155; text-anchor: middle; }
      .handoff-label { font: 600 14px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f766e; text-anchor: middle; }
      .improve-title { font: 600 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #065f46; text-anchor: middle; }
      .improve-text { font: 400 13px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #065f46; text-anchor: middle; }
      .note-text { font: 400 13px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #5b21b6; text-anchor: middle; }
      .manual { fill: #ffffff; stroke: #64748b; stroke-width: 2.2; }
      .system { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.3; }
      .decision { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; }
      .exception { fill: #fff1f2; stroke: #be123c; stroke-width: 2.1; }
      .startend { fill: #f0fdf4; stroke: #15803d; stroke-width: 2.7; }
      .altend { fill: #faf5ff; stroke: #7e22ce; stroke-width: 2.4; }
      .improve { fill: #ecfdf5; stroke: #059669; stroke-width: 2.1; }
      .note { fill: #faf5ff; stroke: #7c3aed; stroke-width: 1.8; stroke-dasharray: 6 4; }
      .flow { fill: none; stroke: #475569; stroke-width: 2.3; marker-end: url(#arrow-t6); }
      .handoff { fill: none; stroke: #0f766e; stroke-width: 2.6; stroke-dasharray: 9 6; marker-end: url(#handoff-arrow-t6); }
      .improvelink { fill: none; stroke: #059669; stroke-width: 1.7; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="2100" height="3000" fill="#ffffff"/>
  <text class="title" x="1050" y="47" text-anchor="middle">目標：系統輔助收件與查攤，保留人工審核及排位</text>
  <text class="subtitle" x="1050" y="77" text-anchor="middle">需求包 0.8-draft／2026-07-15｜同任務 5 範圍｜綠色＝改善、藍色＝系統責任、白色＝人工責任</text>
  <text class="subtitle" x="1050" y="105" text-anchor="middle">FR-06／FR-07 為本期目標能力，不代表第二個可操作切片已完成；正式登入、自動排位與自動通知不在範圍</text>

