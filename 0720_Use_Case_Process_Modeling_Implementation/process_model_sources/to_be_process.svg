  <g><rect class="improve" x="770" y="395" width="250" height="70" rx="11"/><text x="895" y="420"><tspan class="improve-title" x="895">改善 I2｜對應 P2</tspan><tspan class="improve-text" x="895" dy="20">驗證後直接同步待審</tspan><tspan class="improve-text" x="895" dy="18">不再人工搬入試算表</tspan></text></g>
