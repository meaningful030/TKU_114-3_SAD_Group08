  <!-- Owner nodes -->
  <g><ellipse class="startend" cx="180" cy="230" rx="92" ry="32"/><text class="node-text" x="180" y="226"><tspan x="180">開始</tspan><tspan class="small" x="180" dy="20">準備申請</tspan></text></g>
  <g><rect class="manual" x="45" y="290" width="270" height="70" rx="12"/><text class="node-text" x="180" y="318"><tspan x="180">T-C1 填寫並送出</tspan><tspan x="180" dy="22">攤位申請</tspan></text></g>
  <g><rect class="manual" x="45" y="395" width="270" height="70" rx="12"/><text class="node-text" x="180" y="423"><tspan x="180">T-C2 依欄位提示</tspan><tspan x="180" dy="22">修正資料</tspan></text></g>
  <g><rect class="manual" x="45" y="535" width="270" height="70" rx="12"/><text class="node-text" x="180" y="562"><tspan x="180">T-C3 查看編號、時間</tspan><tspan x="180" dy="22">與「審核中」</tspan></text></g>
  <g><rect class="manual" x="45" y="1030" width="270" height="70" rx="12"/><text class="node-text" x="180" y="1058"><tspan x="180">T-C4 查看結果</tspan><tspan x="180" dy="22">與完整意見</tspan></text></g>
  <g><polygon class="decision" points="180,1105 250,1160 180,1215 110,1160"/><text class="node-text" x="180" y="1155"><tspan x="180">T-D3 是否</tspan><tspan x="180" dy="21">立即補正？</tspan></text></g>
  <g><rect class="manual" x="45" y="1260" width="270" height="75" rx="12"/><text class="node-text" x="180" y="1288"><tspan x="180">T-C5 修改原申請</tspan><tspan class="small" x="180" dy="23">同編號重送</tspan></text></g>
  <g><ellipse class="altend" cx="180" cy="1430" rx="100" ry="42"/><text class="node-text" x="180" y="1425"><tspan x="180">替代結束</tspan><tspan class="small" x="180" dy="22">維持退回，日後補正</tspan></text></g>
  <g><rect class="manual" x="45" y="1800" width="270" height="70" rx="12"/><text class="node-text" x="180" y="1828"><tspan x="180">T-C6 等待／查看</tspan><tspan x="180" dy="22">位置公告</tspan></text></g>

