  <g><polygon class="decision" points="690,380 760,430 690,480 620,430"/><text class="node-text" x="690" y="425"><tspan x="690">T-D1 資料</tspan><tspan x="690" dy="21">有效？</tspan></text></g>
  <g><rect class="system" x="490" y="520" width="400" height="80" rx="12"/><text class="node-text" x="690" y="547"><tspan x="690">T-S2 建立編號、時間與審核中</tspan><tspan x="690" dy="22">並同步主辦方待審清單</tspan><tspan class="small" x="690" dy="20">FR-03～FR-04</tspan></text></g>
