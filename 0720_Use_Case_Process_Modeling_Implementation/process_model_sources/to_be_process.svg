  <g><rect class="system" x="700" y="900" width="320" height="75" rx="12"/><text class="node-text" x="860" y="927"><tspan x="860">T-S4 保存退回</tspan><tspan class="small" x="860" dy="22">與完整審核意見</tspan></text></g>
  <g><rect class="system" x="700" y="1030" width="320" height="75" rx="12"/><text class="node-text" x="860" y="1057"><tspan x="860">T-S5 保存通過結果</tspan><tspan class="small" x="860" dy="22">並移出待審清單</tspan></text></g>
  <g><rect class="system" x="355" y="1260" width="320" height="75" rx="12"/><text class="node-text" x="515" y="1287"><tspan x="515">T-S6 同編號重送</tspan><tspan class="small" x="515" dy="22">次數 +1，回到審核中</tspan></text></g>
  <g><polygon class="decision" points="850,1245 920,1300 850,1355 780,1300"/><text class="node-text" x="850" y="1295"><tspan x="850">T-D4 格位</tspan><tspan x="850" dy="21">已占用？</tspan></text></g>
  <g><rect class="exception" x="355" y="1400" width="320" height="75" rx="12"/><text class="node-text" x="515" y="1427"><tspan x="515">T-S7 拒絕新配置</tspan><tspan class="small" x="515" dy="22">保留原配置｜例外 E3</tspan></text></g>
  <g><rect class="system" x="700" y="1400" width="300" height="75" rx="12"/><text class="node-text" x="850" y="1427"><tspan x="850">T-S8 保存</tspan><tspan x="850" dy="22">人工選定配置</tspan></text></g>
  <g><rect class="system" x="490" y="1680" width="400" height="90" rx="12"/><text class="node-text" x="690" y="1707"><tspan x="690">T-S9 由同一配置資料提供</tspan><tspan x="690" dy="22">公開結果文字與靜態地圖標記</tspan><tspan class="small" x="690" dy="20">不含 email｜FR-07、BR-06</tspan></text></g>
  <g><polygon class="decision" points="690,1895 760,1950 690,2005 620,1950"/><text class="node-text" x="690" y="1945"><tspan x="690">T-D6 有完整值</tspan><tspan x="690" dy="21">相符資料？</tspan></text></g>
  <g><rect class="exception" x="355" y="2050" width="320" height="80" rx="12"/><text class="node-text" x="515" y="2077"><tspan x="515">T-S10 顯示 0 筆</tspan><tspan class="small" x="515" dy="22">無結果並清除舊標記</tspan></text></g>
  <g><rect class="system" x="700" y="2050" width="320" height="80" rx="12"/><text class="node-text" x="860" y="2077"><tspan x="860">T-S11 顯示文字位置</tspan><tspan class="small" x="860" dy="22">與一致標記；不顯示 email</tspan></text></g>

