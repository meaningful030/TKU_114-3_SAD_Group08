<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2460" viewBox="0 0 1800 2460" role="img" aria-labelledby="flow-title flow-desc">
  <title id="flow-title">同人誌販售會人工申請、審核排位與現場查攤現況泳道圖</title>
  <desc id="flow-desc">四條直式泳道分別為攤主、主辦方承辦人、一般參加者與現場工作人員。流程從攤主準備申請開始，經表單或 email 送件、人工試算表審核排位、紙本或社群公告，到參加者現場找攤。圖上標示八個判斷、四次角色交接與五個痛點。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <marker id="handoff-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <style>
      .title { font: 600 30px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; }
      .lane-title { font: 600 23px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .node-text { font: 500 18px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 400 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #475569; text-anchor: middle; }
      .edge-label { font: 600 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #334155; text-anchor: middle; }
      .handoff-label { font: 600 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #0f766e; text-anchor: middle; }
      .pain-title { font: 600 16px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #881337; text-anchor: middle; }
      .pain-text { font: 400 14px "Noto Sans TC", "Microsoft JhengHei", sans-serif; fill: #881337; text-anchor: middle; }
      .process { fill: #ffffff; stroke: #64748b; stroke-width: 2.2; }
      .decision { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; }
      .startend { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.8; }
      .pain { fill: #fff1f2; stroke: #be123c; stroke-width: 2.2; }
      .flow { fill: none; stroke: #475569; stroke-width: 2.3; marker-end: url(#arrow); }
      .handoff { fill: none; stroke: #0f766e; stroke-width: 2.6; stroke-dasharray: 9 6; marker-end: url(#handoff-arrow); }
      .painlink { fill: none; stroke: #be123c; stroke-width: 1.8; stroke-dasharray: 6 5; }
    </style>
  </defs>

  <rect width="1800" height="2460" fill="#ffffff"/>
  <text class="title" x="900" y="48" text-anchor="middle">現況：人工收件、審核排位與現場查攤</text>
  <text class="subtitle" x="900" y="78" text-anchor="middle">需求包 0.8-draft｜只呈現目前 email／Google 表單／試算表／紙本與社群公告做法</text>

  <!-- Swimlane backgrounds -->
  <rect x="20" y="110" width="370" height="2330" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="390" y="110" width="730" height="2330" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="1120" y="110" width="340" height="2330" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="1460" y="110" width="320" height="2330" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="20" y="110" width="370" height="62" fill="#e2e8f0"/>
  <rect x="390" y="110" width="730" height="62" fill="#e2e8f0"/>
  <rect x="1120" y="110" width="340" height="62" fill="#e2e8f0"/>
  <rect x="1460" y="110" width="320" height="62" fill="#e2e8f0"/>
  <text class="lane-title" x="205" y="151">攤主</text>
  <text class="lane-title" x="755" y="151">主辦方承辦人</text>
  <text class="lane-title" x="1290" y="151">一般參加者</text>
  <text class="lane-title" x="1620" y="151">現場工作人員</text>

  <!-- Flow paths behind nodes -->
  <path class="flow" d="M205 225 L205 253"/>
  <path class="flow" d="M205 325 L205 354"/>
  <path class="handoff" d="M345 390 L595 390"/>
  <path class="flow" d="M755 426 L755 464"/>
  <path class="flow" d="M755 536 L755 580"/>
  <path class="flow" d="M755 680 L830 724"/>
  <path class="flow" d="M830 796 L755 854"/>
  <path class="flow" d="M755 926 L755 970"/>
  <path class="flow" d="M755 1070 L930 1104"/>
  <path class="flow" d="M930 1176 L930 1224"/>
  <path class="flow" d="M930 1296 L930 1330"/>
  <path class="flow" d="M930 1430 L830 1474"/>
  <path class="flow" d="M830 1546 L830 1590"/>
  <path class="flow" d="M830 1690 L830 1734"/>
  <path class="flow" d="M830 1806 L755 1864"/>

  <!-- D1 incomplete branch and resubmission loop -->
  <path class="flow" d="M690 630 L560 630 L560 724"/>
  <path class="handoff" d="M420 760 L345 760"/>
  <path class="handoff" d="M205 796 L205 830 L500 830 L500 390 L595 390"/>

  <!-- Review notifications to owner waiting/result decisions -->
  <path class="flow" d="M690 1020 L520 1104"/>
  <path class="handoff" d="M520 1176 L390 1176 L390 920 L345 920"/>
  <path class="handoff" d="M790 1140 L390 1140 L390 920 L345 920"/>
  <path class="flow" d="M205 956 L205 982"/>
  <path class="flow" d="M205 1082 L205 1124"/>
  <path class="flow" d="M205 1196 L205 1230"/>
  <path class="flow" d="M205 1330 L205 1374"/>
  <path class="flow" d="M140 1032 L70 1032 L70 1160 L65 1160"/>
  <path class="flow" d="M65 1196 L65 1210 L140 1210 L140 1032"/>
  <path class="flow" d="M140 1280 L65 1280 L65 1438 L65 1438"/>
  <path class="handoff" d="M205 1474 L205 1510 L470 1510 L470 390 L595 390"/>

  <!-- Duplicate position loop -->
  <path class="flow" d="M865 1380 L630 1380 L630 1474"/>
  <path class="flow" d="M630 1546 L630 1570 L1080 1570 L1080 1260 L1070 1260"/>

  <!-- Temporary change branch -->
  <path class="flow" d="M765 1640 L610 1640 L610 1734"/>
  <path class="flow" d="M610 1806 L610 1830 L755 1830 L755 1864"/>

  <!-- Publication handoffs -->
  <path class="handoff" d="M895 1900 L1120 1900 L1150 1900"/>
  <path class="handoff" d="M895 1915 L1460 1915 L1480 1915"/>
  <path class="handoff" d="M755 1936 L755 1990 L345 1990"/>

  <!-- Attendee and staff event flow -->
  <path class="flow" d="M1290 1936 L1290 1970"/>
  <path class="flow" d="M1290 2070 L1290 2114"/>
  <path class="flow" d="M1290 2186 L1290 2310"/>
  <path class="flow" d="M1225 2020 L1135 2020 L1135 2185 L1290 2185 L1290 2210"/>
  <path class="handoff" d="M1430 2246 L1470 2246 L1470 2020 L1555 2020"/>
  <path class="flow" d="M1620 1936 L1620 1970"/>
  <path class="flow" d="M1620 2070 L1620 2114"/>
  <path class="flow" d="M1555 2020 L1510 2020 L1510 2114"/>
  <path class="handoff" d="M1480 2150 L1430 2150"/>
  <path class="flow" d="M1620 2186 L1620 2225"/>

  <!-- Pain links -->
  <path class="painlink" d="M350 885 L345 920"/>
  <path class="painlink" d="M1085 505 L925 500"/>
  <path class="painlink" d="M1085 1365 L995 1380"/>
  <path class="painlink" d="M1085 1765 L970 1770"/>
  <path class="painlink" d="M1115 2010 L1225 2020"/>

  <!-- Owner lane nodes -->
  <g><ellipse class="startend" cx="205" cy="205" rx="92" ry="36"/><text class="node-text" x="205" y="201"><tspan x="205">開始</tspan><tspan class="small" x="205" dy="21">準備申請</tspan></text></g>
  <g><rect class="process" x="65" y="253" width="280" height="72" rx="12"/><text class="node-text" x="205" y="282"><tspan x="205">C1 閱讀簡章</tspan><tspan class="small" x="205" dy="23">準備攤名、類型、聯絡方式與需求</tspan></text></g>
  <g><rect class="process" x="65" y="354" width="280" height="72" rx="12"/><text class="node-text" x="205" y="383"><tspan x="205">C2 以 Google 表單</tspan><tspan x="205" dy="23">或 email 送件</tspan></text></g>
  <g><rect class="process" x="65" y="724" width="280" height="72" rx="12"/><text class="node-text" x="205" y="753"><tspan x="205">C2a 補齊缺漏資料</tspan><tspan class="small" x="205" dy="23">由原管道重新送件</tspan></text></g>
  <g><rect class="process" x="65" y="884" width="280" height="72" rx="12"/><text class="node-text" x="205" y="913"><tspan x="205">C3 等待 email</tspan><tspan x="205" dy="23">或社群公告結果</tspan></text></g>
  <g><polygon class="decision" points="205,982 270,1032 205,1082 140,1032"/><text class="node-text" x="205" y="1027"><tspan x="205">D3 收到</tspan><tspan x="205" dy="21">結果？</tspan></text></g>
  <g><rect class="process" x="5" y="1124" width="120" height="72" rx="12"/><text class="small" x="65" y="1152"><tspan x="65">C4 繼續等待</tspan><tspan x="65" dy="21">或另行確認</tspan></text></g>
  <g><polygon class="decision" points="205,1230 270,1280 205,1330 140,1280"/><text class="node-text" x="205" y="1275"><tspan x="205">D4 審核</tspan><tspan x="205" dy="21">結果？</tspan></text></g>
  <g><rect class="process" x="65" y="1374" width="280" height="72" rx="12"/><text class="node-text" x="205" y="1403"><tspan x="205">C5 依通知補資料</tspan><tspan class="small" x="205" dy="23">再由原管道重送</tspan></text></g>
  <g><rect class="process" x="65" y="1964" width="280" height="72" rx="12"/><text class="node-text" x="205" y="1993"><tspan x="205">C6 等待／查看</tspan><tspan x="205" dy="23">位置公告</tspan></text></g>

  <!-- Organizer lane nodes -->
  <g><rect class="process" x="595" y="354" width="320" height="72" rx="12"/><text class="node-text" x="755" y="383"><tspan x="755">O1 接收表單／email 申請</tspan><tspan class="small" x="755" dy="23">角色交接 H1</tspan></text></g>
  <g><rect class="process" x="585" y="464" width="340" height="72" rx="12"/><text class="node-text" x="755" y="493"><tspan x="755">O2 人工複製、彙整</tspan><tspan x="755" dy="23">至試算表</tspan></text></g>
  <g><polygon class="decision" points="755,580 820,630 755,680 690,630"/><text class="node-text" x="755" y="625"><tspan x="755">D1 資料</tspan><tspan x="755" dy="21">完整？</tspan></text></g>
  <g><rect class="process" x="420" y="724" width="280" height="72" rx="12"/><text class="node-text" x="560" y="753"><tspan x="560">O3 通知攤主</tspan><tspan x="560" dy="23">補資料</tspan></text></g>
  <g><rect class="process" x="690" y="854" width="260" height="72" rx="12"/><text class="node-text" x="820" y="883"><tspan x="820">O4 人工審核</tspan><tspan x="820" dy="23">並記錄結果</tspan></text></g>
  <g><polygon class="decision" points="755,970 820,1020 755,1070 690,1020"/><text class="node-text" x="755" y="1015"><tspan x="755">D2 是否</tspan><tspan x="755" dy="21">通過？</tspan></text></g>
  <g><rect class="process" x="390" y="1104" width="260" height="72" rx="12"/><text class="node-text" x="520" y="1133"><tspan x="520">O5a 通知退回</tspan><tspan class="small" x="520" dy="23">與補充要求</tspan></text></g>
  <g><rect class="process" x="790" y="1104" width="280" height="72" rx="12"/><text class="node-text" x="930" y="1133"><tspan x="930">O5b 通知通過</tspan><tspan class="small" x="930" dy="23">email／社群</tspan></text></g>
  <g><rect class="process" x="790" y="1224" width="280" height="72" rx="12"/><text class="node-text" x="930" y="1253"><tspan x="930">O6 在試算表</tspan><tspan x="930" dy="23">手動排位</tspan></text></g>
  <g><polygon class="decision" points="930,1330 995,1380 930,1430 865,1380"/><text class="node-text" x="930" y="1375"><tspan x="930">D5 有重複</tspan><tspan x="930" dy="21">格位？</tspan></text></g>
  <g><rect class="process" x="490" y="1474" width="280" height="72" rx="12"/><text class="node-text" x="630" y="1503"><tspan x="630">O7 人工重新</tspan><tspan x="630" dy="23">調整位置</tspan></text></g>
  <g><rect class="process" x="690" y="1474" width="280" height="72" rx="12"/><text class="node-text" x="830" y="1503"><tspan x="830">O8 匯出攤位</tspan><tspan x="830" dy="23">配置表</tspan></text></g>
  <g><polygon class="decision" points="830,1590 895,1640 830,1690 765,1640"/><text class="node-text" x="830" y="1635"><tspan x="830">D6 有臨時</tspan><tspan x="830" dy="21">異動？</tspan></text></g>
  <g><rect class="process" x="470" y="1734" width="280" height="72" rx="12"/><text class="node-text" x="610" y="1763"><tspan x="610">O9 人工修改</tspan><tspan x="610" dy="23">公告／配置副本</tspan></text></g>
  <g><rect class="process" x="615" y="1864" width="280" height="72" rx="12"/><text class="node-text" x="755" y="1892"><tspan x="755">O10 發布紙本場刊／社群</tspan><tspan class="small" x="755" dy="23">並交付配置表</tspan></text></g>

  <!-- Attendee and staff nodes -->
  <g><rect class="process" x="1150" y="1864" width="280" height="72" rx="12"/><text class="node-text" x="1290" y="1893"><tspan x="1290">A1 查閱紙本場刊</tspan><tspan x="1290" dy="23">或社群公告</tspan></text></g>
  <g><polygon class="decision" points="1290,1970 1355,2020 1290,2070 1225,2020"/><text class="node-text" x="1290" y="2015"><tspan x="1290">D7 與現場</tspan><tspan x="1290" dy="21">一致？</tspan></text></g>
  <g><rect class="process" x="1150" y="2114" width="280" height="72" rx="12"/><text class="node-text" x="1290" y="2143"><tspan x="1290">A2 依編號與位置</tspan><tspan x="1290" dy="23">前往攤位</tspan></text></g>
  <g><rect class="process" x="1150" y="2210" width="280" height="72" rx="12"/><text class="node-text" x="1290" y="2239"><tspan x="1290">A3 詢問現場</tspan><tspan x="1290" dy="23">工作人員</tspan></text></g>
  <g><ellipse class="startend" cx="1290" cy="2350" rx="125" ry="40"/><text class="node-text" x="1290" y="2345"><tspan x="1290">結束 A</tspan><tspan class="small" x="1290" dy="22">找到攤位</tspan></text></g>

  <g><rect class="process" x="1480" y="1864" width="280" height="72" rx="12"/><text class="node-text" x="1620" y="1893"><tspan x="1620">S1 查看主辦方</tspan><tspan x="1620" dy="23">提供的配置表</tspan></text></g>
  <g><polygon class="decision" points="1620,1970 1685,2020 1620,2070 1555,2020"/><text class="node-text" x="1620" y="2015"><tspan x="1620">D8 版本能</tspan><tspan x="1620" dy="21">確認位置？</tspan></text></g>
  <g><rect class="process" x="1480" y="2114" width="280" height="72" rx="12"/><text class="node-text" x="1620" y="2143"><tspan x="1620">S2 口頭指引</tspan><tspan x="1620" dy="23">參加者</tspan></text></g>
  <g><rect class="process" x="1495" y="2225" width="250" height="72" rx="12"/><text class="node-text" x="1620" y="2254"><tspan x="1620">S3 回問主辦方</tspan><tspan x="1620" dy="23">或現場查證</tspan></text></g>
  <g><ellipse class="startend" cx="1620" cy="2350" rx="145" ry="40"/><text class="node-text" x="1620" y="2345"><tspan x="1620">結束 B</tspan><tspan class="small" x="1620" dy="22">無法及時確認</tspan></text></g>

  <!-- Edge labels -->
  <text class="handoff-label" x="470" y="375">H1 表單／email</text>
  <text class="edge-label" x="835" y="620">是</text><text class="edge-label" x="645" y="620">否</text>
  <text class="edge-label" x="835" y="1008">是</text><text class="edge-label" x="655" y="1008">否</text>
  <text class="handoff-label" x="465" y="905">H2 審核／補件通知</text>
  <text class="edge-label" x="278" y="1110">是</text><text class="edge-label" x="105" y="1017">否</text>
  <text class="edge-label" x="278" y="1270">通過</text><text class="edge-label" x="102" y="1268">退回</text>
  <text class="edge-label" x="825" y="1368">有</text><text class="edge-label" x="1015" y="1368">無</text>
  <text class="edge-label" x="740" y="1628">有</text><text class="edge-label" x="910" y="1628">無</text>
  <text class="handoff-label" x="1015" y="1888">H3 公告／配置表</text>
  <text class="edge-label" x="1375" y="2008">是</text><text class="edge-label" x="1195" y="2008">否</text>
  <text class="handoff-label" x="1505" y="2228">H4 口頭詢問</text>
  <text class="edge-label" x="1705" y="2008">能</text><text class="edge-label" x="1525" y="2008">不能</text>

  <!-- Pain point callouts -->
  <g><rect class="pain" x="20" y="820" width="330" height="64" rx="12"/><text x="185" y="845"><tspan class="pain-title" x="185">痛點 P1｜等待不透明</tspan><tspan class="pain-text" x="185" dy="21">擔心漏件、需反覆等待或確認</tspan></text></g>
  <g><rect class="pain" x="930" y="468" width="155" height="74" rx="12"/><text x="1008" y="492"><tspan class="pain-title" x="1008">痛點 P2</tspan><tspan class="pain-text" x="1008" dy="20">人工彙整易漏件</tspan><tspan class="pain-text" x="1008" dy="18">與重複處理</tspan></text></g>
  <g><rect class="pain" x="1000" y="1328" width="155" height="78" rx="12"/><text x="1078" y="1352"><tspan class="pain-title" x="1078">痛點 P3</tspan><tspan class="pain-text" x="1078" dy="20">人工排位可能</tspan><tspan class="pain-text" x="1078" dy="18">重複格位</tspan></text></g>
  <g><rect class="pain" x="920" y="1728" width="165" height="78" rx="12"/><text x="1003" y="1752"><tspan class="pain-title" x="1003">痛點 P4</tspan><tspan class="pain-text" x="1003" dy="20">多份公告／配置</tspan><tspan class="pain-text" x="1003" dy="18">臨時異動易不同步</tspan></text></g>
  <g><rect class="pain" x="950" y="1968" width="165" height="86" rx="12"/><text x="1033" y="1992"><tspan class="pain-title" x="1033">痛點 P5</tspan><tspan class="pain-text" x="1033" dy="20">資訊與現場不一</tspan><tspan class="pain-text" x="1033" dy="18">迷路、排錯隊並</tspan><tspan class="pain-text" x="1033" dy="18">增加詢問負擔</tspan></text></g>
</svg>
